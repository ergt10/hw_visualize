<!doctype html>
<meta charset="utf-8">
<title>音乐流派占比 旭日图</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  body { font-family: sans-serif; background: #080b10; color: #eef2f7; }
  svg { width: 100%; height: 90vh; }
  svg text { fill: #f7fbff; }
  .tooltip { position: absolute; background: rgba(12,16,22,0.95); color: #f7f9fc; padding: 6px 8px; border-radius: 4px; pointer-events: none; font-size: 13px; }
  .legend { font-size: 13px; color: #9da8b7; }
  .center-label { position: absolute; left: 0; right: 0; text-align: center; margin-top: -24px; font-weight: bold; }
  svg path { shape-rendering: geometricPrecision; }
  .highlight-line { pointer-events: none; }
</style>
<h1 style="text-align:center; margin-top: 16px; font-size: 24px;">2021-2025 QQ音乐巅峰榜数据</h1>
<div id="year-control" style="text-align:center; margin: 16px 0;">
  <label style="font-size:16px; margin-right: 20px;">选择月份：
    <select id="month-select" style="font-size:16px; padding:4px 8px; margin-left:8px;">
      <option value="1">1月</option>
      <option value="4">4月</option>
      <option value="7">7月</option>
      <option value="10">10月</option>
    </select>
  </label>
  <label id="year-label-anchor" style="font-size:16px; margin-left: 24px;">选择年份：</label>
  <div id="year-buttons" style="display:inline-flex; gap:8px; margin-left:12px; vertical-align:middle;"></div>
  <span id="year-label" style="margin-left:16px; font-size:16px; color:#eef2f7;">全部</span>
</div>
<div id="vis-container" style="display:flex; justify-content:center; gap:24px; align-items:flex-start;">
  <div id="vis"></div>
  <div id="legend" style="min-width:180px; padding:12px 10px; border:1px solid rgba(255,255,255,0.08); border-radius:8px; background:rgba(19,24,32,0.96); box-shadow:0 2px 8px rgba(0,0,0,0.35);"></div>
</div>
<div id="tooltip" class="tooltip" style="display:none"></div>
<script>
const genreColor = new Map([
  // 略微提高除“流行”外颜色的饱和度
  ['R&B','#ff9a6a'],
  ['民谣','#ff80a0'],
  ['流行','#d0d7e0'],
  ['电子','#a88cff'],
  ['说唱','#7fd8eb'],
  ['古风','#73c88f'],
  ['摇滚','#ff98ba'],
  ['其他','#8fd6ff']
]);
const highlightColor = '#3f8cff';

const totalWidth = 1200, totalHeight = 700;
const monthsToShow = [1,4,7,10];
const chartWidth = totalWidth;
const chartHeight = totalHeight;
const chartRadius = Math.min(chartWidth, chartHeight) / 2 - 20;

const container = d3.select('#vis').style('display','flex').style('justify-content','center');
const legendContainer = d3.select('#legend');

const ranges = monthsToShow.map(m=>({label: `${m}月`, month: String(m)}));

const yearLabel = document.getElementById('year-label');
const yearButtons = document.getElementById('year-buttons');
const monthSelect = document.getElementById('month-select');

fetch('sunburst.json').then(r=>r.json()).then(data=>{
  const years = (data.children || []).slice().sort((a,b)=>a.name.localeCompare(b.name));
  const tooltip = d3.select('#tooltip');

  legendContainer.html('');
  legendContainer.append('div').style('font-weight','bold').style('margin-bottom','8px').text('音乐流派');
  Array.from(genreColor.entries()).forEach(([genre,color]) => {
    if (genre === '其他') return; // 不在图例中显示 “其他”
    const item = legendContainer.append('div').style('display','flex').style('align-items','center').style('margin','4px 0');
    item.append('div')
      .style('width','14px')
      .style('height','14px')
      .style('border-radius','3px')
      .style('background', color)
      .style('margin-right','8px');
    item.append('div').style('font-size','13px').text(genre);
  });

  let selectedMonth = monthSelect.value;
  let selectedYears = [];

  function updateYearHighlight() {
    const label = selectedYears.length === years.length ? '全部' : selectedYears.join(',');
    yearLabel.textContent = label;
    d3.selectAll('.year-path')
      .attr('opacity', d => selectedYears.includes(d.year) ? 1 : 0.15);
    yearButtons.querySelectorAll('button').forEach(btn => {
      const year = btn.dataset.year;
      btn.style.background = selectedYears.includes(year) ? '#2ca02c' : '#fff';
      btn.style.color = selectedYears.includes(year) ? '#fff' : '#333';
      btn.style.borderColor = selectedYears.includes(year) ? '#2ca02c' : '#ccc';
    });
  }

  const svg = container.append('svg')
    .attr('viewBox', [-chartWidth/2, -chartHeight/2, chartWidth, chartHeight])
    .style('width', `${chartWidth}px`).style('height', `${chartHeight}px`);

  const chartRoot = svg.append('g');
  const chartGroup = chartRoot.append('g').attr('class', 'chart-group');
  const highlightLayer = chartRoot.append('g').attr('class', 'highlight-layer');

  svg.append('text')
    .attr('y', -chartHeight/2 + 18)
    .attr('x', -chartWidth/2 + 8)
    .attr('font-weight','bold')
    .text('流派占比环形图');

  const ringGap = 12;
  const ringWidth = ((chartRadius - 30 - ringGap * Math.max(0, years.length - 1)) / Math.max(1, years.length)) * 16 / 27;
  const innerStart = chartRadius - (ringWidth * years.length + ringGap * Math.max(0, years.length - 1));

  function drawChart(month) {
    chartGroup.selectAll('*').remove();
    highlightLayer.selectAll('.highlight-line').remove();

    const anchor = document.getElementById('year-label-anchor');
    const anchorRect = anchor.getBoundingClientRect();
    const containerRect = container.node().getBoundingClientRect();
    const anchorCenterX = anchorRect.left + anchorRect.width / 2 - containerRect.left;
    const svgCenterX = chartWidth / 2;
    const offsetX = anchorCenterX - svgCenterX;
    chartRoot.attr('transform', `translate(${offsetX}, 0)`);

    years.forEach((year, yi)=>{
      const records = year.children || [];
      const slice = records.filter(r => String(r.month) === month).slice(0, 150);
      if (slice.length === 0) return;

      const genreOrder = Array.from(genreColor.keys());
      const grouped = [];
      genreOrder.forEach(g => {
        slice.filter(r => (r.genre || '其他') === g).forEach(rec => grouped.push(rec));
      });
      const count = grouped.length;
      if (count === 0) return;

      const innerR = innerStart + yi * (ringWidth + ringGap);
      const outerR = innerR + ringWidth;

      grouped.forEach((rec, i) => {
        const start = (i / count) * 2 * Math.PI;
        const end = ((i + 1) / count) * 2 * Math.PI;
        const pathStr = d3.arc().startAngle(start).endAngle(end).innerRadius(innerR).outerRadius(outerR)();
        chartGroup.append('path')
          .datum({rec, year: year.name, idx: i, count, start, end, innerR, outerR})
          .attr('class', 'year-path')
          .attr('d', pathStr)
          .attr('fill', genreColor.get(rec.genre) || genreColor.get('其他'))
          .attr('fill-opacity', 1)
          .attr('stroke', '#ffffff')
          .attr('stroke-width', 0.6)
          .attr('stroke-linejoin', 'round')
          .on('mousemove', (event,d)=>{
            highlightLayer.selectAll('.highlight-line').remove();
            const outerRadius = d.outerR;
            highlightLayer.append('path')
              .attr('class', 'highlight-line')
              .attr('d', d3.arc()
                .startAngle(d.start)
                .endAngle(d.end)
                .innerRadius(0)
                .outerRadius(outerRadius)())
              .attr('fill', hexToRgba(highlightColor, 0.18))
              .attr('stroke', highlightColor)
              .attr('stroke-width', 1)
              .attr('stroke-linejoin', 'round');
            tooltip.style('display','block').style('left', (event.pageX+10)+'px').style('top', (event.pageY+10)+'px')
              .html(`${d.year} / ${d.rec.name || ''}<br>流派: ${d.rec.genre || '其他'}`);
          })
          .on('mouseout', ()=>{
            highlightLayer.selectAll('.highlight-line').remove();
            tooltip.style('display','none');
          });
      });
    });
    updateYearHighlight();
    svg.select('text').text(`月度环形图 — ${month}月`);
  }

  function createYearButtons() {
    yearButtons.innerHTML = '';
    years.forEach(year => {
      const button = document.createElement('button');
      button.textContent = year.name;
      button.dataset.year = year.name;
      button.style.padding = '6px 12px';
      button.style.border = '1px solid #ccc';
      button.style.borderRadius = '4px';
      button.style.background = '#fff';
      button.style.cursor = 'pointer';
      button.addEventListener('click', () => {
        const yearValue = button.dataset.year;
        const index = selectedYears.indexOf(yearValue);
        if (index >= 0) {
          if (selectedYears.length > 1) {
            selectedYears.splice(index, 1);
          }
        } else {
          selectedYears.push(yearValue);
        }
        if (selectedYears.length === 0) {
          selectedYears = years.map(y => y.name);
        }
        updateYearHighlight();
      });
      yearButtons.appendChild(button);
    });
  }

  // helper: convert hex to rgba string with alpha
  function hexToRgba(hex, alpha){
    const h = hex.replace('#','');
    const bigint = parseInt(h,16);
    const r = (bigint >> 16) & 255;
    const g = (bigint >> 8) & 255;
    const b = bigint & 255;
    return `rgba(${r},${g},${b},${alpha})`;
  }

  createYearButtons();
  selectedYears = years.map(y => y.name);
  updateYearHighlight();

  monthSelect.addEventListener('change', () => {
    selectedMonth = monthSelect.value;
    drawChart(selectedMonth);
  });

  drawChart(selectedMonth);
});
</script>
