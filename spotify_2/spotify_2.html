<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Top 200 特征相关性可视化</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
</head>
<body>
  <header>
    <h1>Spotify Top 200 特征相关性可视化</h1>
    <p>展示 13 个变量之间的相关系数矩阵，点击任意方块可查看对应变量的散点拟合图。</p>
    <p class="server-note">请通过本地 HTTP 服务器打开此页面，例如：<code>python3 -m http.server 8000</code></p>
  </header>

  <main>
    <section class="chart-section">
      <article class="card heatmap-card">
        <h2>相关系数矩阵</h2>
        <p class="card-description">相关系数越接近 0，颜色越偏蓝；越接近 1，颜色越偏红。点击任一单元格，可查看对应变量对的散点图与线性拟合趋势。</p>
        <div id="heatmap-legend" class="heatmap-legend"></div>
        <div id="heatmap-container" class="heatmap-container">
          <div class="panel-placeholder">正在加载相关系数矩阵数据...</div>
        </div>
      </article>

      <article class="card scatter-card">
        <h2 id="scatter-title">点击矩阵方块查看变量散点图</h2>
        <p id="scatter-description" class="card-description">散点图显示所选变量间的分布与拟合趋势。</p>
        <div id="scatter-container" class="scatter-container">
          <div class="panel-placeholder">请点击矩阵方块后查看散点图。</div>
        </div>
      </article>
    </section>
  </main>

  <div id="tooltip" class="tooltip" style="opacity: 0;"></div>
  <script src="app.js"></script>
</body>
</html>
