<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Top 200 音频特征径向可视化</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
</head>
<body>
  <header>
    <h1>Spotify Top 200 音频特征径向可视化</h1>
    <p>按排名前200的数据，从12点方向开始顺时针排列，用线段长度表示值的高低。</p>
    <p>可通过下方选择框切换不同音频特征，单图放大展示便于观察。</p>
  </header>

  <main>
    <div class="control-row">
      <span class="control-label">选择分析维度：</span>
      <div id="metric-buttons" class="button-group"></div>
    </div>
    <div id="chart-panel" class="chart-panel"></div>
  </main>

  <div id="tooltip" class="tooltip" style="opacity: 0;"></div>
  <script src="app.js"></script>
</body>
</html>
